<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>runeskate</title>
  <link rel="icon" type="image/png" href="https://media.bio.site/sites/236dd1f6-0640-47ed-a55b-bdaac973cf03/Uc5gHtkVtx8SvZwAbBhQxF.png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Playfair+Display:wght@900&family=JetBrains+Mono&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-gradient: linear-gradient(135deg, #b07d7d 0%, #d48c5d 50%, #c46a4a 100%);
      --text-primary: #f5e6d3;
      --font-serif: 'Playfair Display', serif;
      --font-sans: 'Inter', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--bg-gradient);
      color: var(--text-primary);
      font-family: var(--font-sans);
      overflow-x: hidden;
      min-height: 100vh;
      cursor: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      user-select: none;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      z-index: -1;
      pointer-events: none;
      opacity: 0.3;
    }

    /* Custom Cursor */
    .custom-cursor {
      width: 8px;
      height: 8px;
      background: white;
      border-radius: 50%;
      position: fixed;
      pointer-events: none;
      z-index: 9999;
      mix-blend-mode: difference;
      transform: translate(-50%, -50%);
      transition: width 0.2s, height 0.2s, background-color 0.2s;
    }

    .custom-cursor.hovering {
      width: 4px;
      height: 4px;
    }

    .custom-cursor-follower {
      width: 30px;
      height: 30px;
      border: 1px solid white;
      border-radius: 50%;
      position: fixed;
      pointer-events: none;
      z-index: 9998;
      transform: translate(-50%, -50%);
      transition: transform 0.1s ease-out, width 0.3s, height 0.3s, background-color 0.3s, border-color 0.3s;
      opacity: 0.5;
    }

    .custom-cursor-follower.hovering {
      width: 60px;
      height: 60px;
      background: rgba(255, 255, 255, 0.15);
      border-color: transparent;
    }

    /* Background Text Overlay */
    .bg-text-overlay {
      position: fixed;
      inset: -20%;
      pointer-events: none;
      opacity: 0.08;
      z-index: -1;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      gap: 20px;
      padding: 20px;
      transform: rotate(-5deg) scale(1.2);
      font-family: var(--font-serif);
    }

    .bg-text-item {
      font-size: 8rem;
      font-weight: 900;
      white-space: nowrap;
      line-height: 0.8;
      letter-spacing: -0.02em;
      pointer-events: auto;
      transition: opacity 0.3s, color 0.3s, filter 0.3s;
    }

    .bg-text-item:hover {
      opacity: 0.5;
      color: white;
      animation-play-state: paused;
      filter: drop-shadow(0 0 10px white);
    }

    .bg-text-item.scroll-left {
      animation: scrollLeft 60s linear infinite;
    }

    .bg-text-item.scroll-right {
      animation: scrollRight 60s linear infinite;
    }

    @keyframes scrollLeft {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    @keyframes scrollRight {
      0% { transform: translateX(-50%); }
      100% { transform: translateX(0); }
    }

    /* Main Content */
    .main-content {
      width: 100%;
      max-width: 800px;
      padding: 40px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      z-index: 10;
      transition: transform 0.1s ease-out;
    }

    .profile-section {
      margin-bottom: 40px;
    }

    .profile-img-container {
      width: 200px;
      height: 200px;
      margin-bottom: 20px;
      border-radius: 1rem;
      overflow: hidden;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
      transition: transform 0.3s cubic-bezier(0.23, 1, 0.32, 1), box-shadow 0.3s ease;
      will-change: transform;
    }

    .profile-img-container:hover {
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.3);
    }

    .profile-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .aka-text {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.3em;
      opacity: 0.6;
      margin-bottom: 30px;
      font-weight: 600;
    }

    .social-icons {
      display: flex;
      justify-content: center;
      gap: 25px;
      margin-bottom: 40px;
    }

    .social-icons a {
      color: var(--text-primary);
      font-size: 18px;
      opacity: 0.7;
      transition: color 0.3s ease, opacity 0.3s ease, transform 0.2s cubic-bezier(0.23, 1, 0.32, 1);
      display: inline-block;
      will-change: transform;
    }

    .social-icons a:hover {
      opacity: 1;
      transform: translateY(-3px);
    }

    /* Bottom Grid Cards */
    .bottom-grid {
      display: flex;
      justify-content: center;
      gap: 40px;
      width: 100%;
      max-width: 600px;
    }

    .grid-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .grid-card {
      width: 120px;
      height: 120px;
      border-radius: 1rem;
      background: rgba(255, 255, 255, 0.9);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
      transition: transform 0.3s cubic-bezier(0.23, 1, 0.32, 1), box-shadow 0.3s ease;
      text-decoration: none;
      will-change: transform;
    }

    .grid-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 15px 30px rgba(0, 0, 0, 0.15);
    }

    .grid-card img {
      max-width: 70%;
      max-height: 70%;
      object-fit: contain;
    }

    .grid-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      opacity: 0.6;
      font-weight: 600;
      transition: all 0.3s ease;
    }

    .grid-item:hover .grid-label {
      opacity: 1;
      letter-spacing: 0.2em;
      color: white;
    }

    .boundaries-container {
      display: flex;
      gap: 10px;
    }

    .circle {
      width: 45px;
      height: 45px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 900;
      color: white;
    }

    .circle.yes { background: #4ade80; }
    .circle.no { background: #f87171; }

    .age-icon {
      opacity: 0.8;
    }

    /* Scanline effect */
    .scanline {
      width: 100%;
      height: 100px;
      z-index: 10;
      background: linear-gradient(0deg, rgba(0, 0, 0, 0) 0%, rgba(255, 255, 255, 0.05) 50%, rgba(0, 0, 0, 0) 100%);
      opacity: 0.1;
      position: absolute;
      bottom: 100%;
      animation: scanline 10s linear infinite;
      pointer-events: none;
    }

    @keyframes scanline {
      0% { bottom: 100%; }
      100% { bottom: -100px; }
    }

    /* Music Player */
    .music-player {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 30px;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      gap: 15px;
      z-index: 100;
      color: white;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      transition: transform 0.3s ease;
    }

    .music-player:hover {
      transform: translateY(-5px);
    }

    .music-player button {
      background: none;
      border: none;
      color: white;
      font-size: 14px;
      cursor: none; /* Use custom cursor */
      opacity: 0.8;
      transition: opacity 0.3s, transform 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.1);
    }

    .music-player button:hover {
      opacity: 1;
      transform: scale(1.1);
      background: rgba(255, 255, 255, 0.2);
    }

    .track-info {
      display: flex;
      flex-direction: column;
      font-size: 12px;
      max-width: 150px;
    }

    #track-title {
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #track-artist {
      font-size: 10px;
      opacity: 0.6;
    }
  </style>
  <script src="https://w.soundcloud.com/player/api.js"></script>
</head>
<body>

<canvas id="visual"></canvas>
<div class="scanline"></div>

<div class="bg-text-overlay" id="bg-text"></div>

<div class="custom-cursor" id="cursor"></div>
<div class="custom-cursor-follower" id="cursor-follower"></div>

<div class="main-content">
  <div class="profile-section">
    <div class="profile-img-container">
      <img src="https://media.bio.site/sites/236dd1f6-0640-47ed-a55b-bdaac973cf03/Uc5gHtkVtx8SvZwAbBhQxF.png" alt="runeskate" class="profile-img">
    </div>
  </div>

  <div class="social-icons">
    <a href="https://bsky.app/profile/runeskate.bsky.social" target="_blank" title="BlueSky"><i class="fa fa-cloud"></i></a>
    <a href="https://www.youtube.com/@runeskatee" target="_blank" title="YouTube"><i class="fa fa-youtube-play"></i></a>
    <a href="https://x.com/@runeskate" target="_blank" title="X"><i class="fa fa-twitter"></i></a>
    <a href="https://open.spotify.com/artist/27VTriHuDxNYlfLPa2KRx5" target="_blank" title="Spotify"><i class="fa fa-spotify"></i></a>
    <a href="https://soundcloud.com/runeskate" target="_blank" title="SoundCloud"><i class="fa fa-soundcloud"></i></a>
    <a href="https://discord.com/users/1280652814217117696" target="_blank" title="Discord"><i class="fa fa-comments"></i></a>
    <a href="https://runeskate.bandcamp.com/" target="_blank" title="Bandcamp"><i class="fa fa-bandcamp"></i></a>
    <a href="https://vrchat.com/home/user/usr_0e7cd2a2-f06d-42c2-a27c-63d96593acf0" target="_blank" title="VRChat"><i class="fa fa-gamepad"></i></a>
  </div>

  <div class="bottom-grid">
    <div class="grid-item">
      <a href="https://www.thecalculatorsite.com/misc/birthday-calculator.php?birthdate=2005-01-15" target="_blank" class="grid-card">
        <img src="https://www.thecalculatorsite.com/images/birthday-calculator/birthday-day.png" alt="Age" class="age-icon">
      </a>
      <span class="grid-label">Age</span>
    </div>
    <div class="grid-item">
      <a href="https://docs.google.com/document/d/1I--bXs8S9Rawt7CE7G2RQ9D1qtM3sb_e7FYvtEiUcp4/edit?tab=t.0" target="_blank" class="grid-card">
        <div class="boundaries-container">
          <div class="circle yes">YES</div>
          <div class="circle no">NO</div>
        </div>
      </a>
      <span class="grid-label">Boundaries</span>
    </div>
  </div>
</div>

<!-- Hidden SoundCloud Player -->
<iframe id="sc-widget" src="https://w.soundcloud.com/player/?url=https%3A//soundcloud.com/runeskate/tracks&auto_play=true&hide_related=true&show_comments=false&show_user=false&show_reposts=false&visual=false" width="100%" height="166" scrolling="no" frameborder="no" allow="autoplay" style="display:none;"></iframe>

<!-- Custom Music Player UI -->
<div class="music-player" id="music-player">
  <button id="play-pause-btn" title="Play/Pause"><i class="fa fa-play"></i></button>
  <button id="shuffle-btn" title="Shuffle (SoundCloud)"><i class="fa fa-random"></i></button>
  <a href="https://runeskate.bandcamp.com/" target="_blank" title="Listen on Bandcamp (Default)" style="color: white; opacity: 0.8; transition: opacity 0.3s; margin-left: 5px;"><i class="fa fa-bandcamp" style="font-size: 18px;"></i></a>
  <div class="track-info">
    <span id="track-title">Ready to Play</span>
    <span id="track-artist">SoundCloud</span>
  </div>
</div>

<script>
  // Background Text
  const bgTextContainer = document.getElementById('bg-text');
  const nameText = "Hollyn ";
  for (let i = 0; i < 30; i++) {
    const div = document.createElement('div');
    div.className = `bg-text-item ${i % 2 === 0 ? 'scroll-left' : 'scroll-right'}`;
    div.textContent = nameText.repeat(40);
    bgTextContainer.appendChild(div);
  }

  // Plasma Background
  const canvas = document.getElementById('visual');
  const ctx = canvas.getContext('2d');
  let particles = [];
  const particleCount = 80;
  let mouse = { x: null, y: null, radius: 150 };
  const symbols = ['╦Ü', 'Ôőć', 'ÔťŽ', 'Ôśü', 'Ôťę', 'Ôśż', 'Ôťž'];

  window.addEventListener('mousemove', (e) => {
    mouse.x = e.clientX;
    mouse.y = e.clientY;
  });

  window.addEventListener('mousedown', (e) => {
    for (let i = 0; i < 15; i++) {
      particles.push(new Particle(e.clientX, e.clientY, true));
    }
  });

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }

  class Particle {
    constructor(x, y, isTemporary = false) {
      this.isTemporary = isTemporary;
      this.life = isTemporary ? 100 : Infinity;
      this.symbol = symbols[Math.floor(Math.random() * symbols.length)];
      this.init(x, y);
    }
    init(x, y) {
      this.x = x || Math.random() * canvas.width;
      this.y = y || Math.random() * canvas.height;
      this.size = Math.random() * 15 + 5;
      this.baseX = this.x;
      this.baseY = this.y;
      this.density = (Math.random() * 30) + 1;
      this.speedX = (Math.random() - 0.5) * 1;
      this.speedY = (Math.random() - 0.5) * 1;
      this.rotation = Math.random() * Math.PI * 2;
      this.rotationSpeed = (Math.random() - 0.5) * 0.02;
    }
    update() {
      // Basic movement
      this.x += this.speedX;
      this.y += this.speedY;
      this.rotation += this.rotationSpeed;

      // Wrap around
      if (this.x > canvas.width + 50) this.x = -50;
      else if (this.x < -50) this.x = canvas.width + 50;
      if (this.y > canvas.height + 50) this.y = -50;
      else if (this.y < -50) this.y = canvas.height + 50;

      // Mouse interaction (repulsion)
      if (mouse.x != null && mouse.y != null) {
        let dx = mouse.x - this.x;
        let dy = mouse.y - this.y;
        let distance = Math.sqrt(dx * dx + dy * dy);
        if (distance < mouse.radius) {
          const forceDirectionX = dx / distance;
          const forceDirectionY = dy / distance;
          const maxDistance = mouse.radius;
          const force = (maxDistance - distance) / maxDistance;
          const directionX = forceDirectionX * force * this.density;
          const directionY = forceDirectionY * force * this.density;
          this.x -= directionX;
          this.y -= directionY;
        }
      }

      if (this.isTemporary) {
        this.life -= 1;
      }
    }
    draw() {
      let opacity = this.isTemporary ? this.life / 100 : 0.4;

      // Glow near mouse
      if (mouse.x != null && mouse.y != null) {
        let dx = mouse.x - this.x;
        let dy = mouse.y - this.y;
        let distance = Math.sqrt(dx * dx + dy * dy);
        if (distance < 150) {
          opacity = Math.min(0.8, opacity + (1 - distance / 150) * 0.4);
        }
      }

      ctx.save();
      ctx.translate(this.x, this.y);
      ctx.rotate(this.rotation);
      ctx.fillStyle = `rgba(255, 255, 255, ${opacity})`;
      ctx.font = `${this.size}px serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(this.symbol, 0, 0);
      ctx.restore();
    }
  }

  function initParticles() {
    particles = [];
    for (let i = 0; i < particleCount; i++) {
      particles.push(new Particle());
    }
  }

  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Filter out dead temporary particles
    particles = particles.filter(p => !p.isTemporary || p.life > 0);

    particles.forEach(p => {
      p.update();
      p.draw();
    });

    // Removed line drawing between particles for a cleaner celestial look
    requestAnimationFrame(animate);
  }

  window.addEventListener('resize', resize);
  resize();
  initParticles();
  animate();

  // Custom Cursor
  const cursor = document.getElementById('cursor');
  const follower = document.getElementById('cursor-follower');
  const mainContent = document.querySelector('.main-content');
  const magneticElements = document.querySelectorAll('.social-icons a, .grid-card, .profile-img-container');

  document.addEventListener('mousemove', (e) => {
    const x = e.clientX;
    const y = e.clientY;

    cursor.style.left = x + 'px';
    cursor.style.top = y + 'px';

    setTimeout(() => {
      follower.style.left = x + 'px';
      follower.style.top = y + 'px';
    }, 50);

    // Parallax effect for main content
    const moveX = (x - window.innerWidth / 2) / 50;
    const moveY = (y - window.innerHeight / 2) / 50;
    mainContent.style.transform = `translate(${moveX}px, ${moveY}px)`;

    // Background text reaction
    const bgItems = document.querySelectorAll('.bg-text-item');
    bgItems.forEach((item, index) => {
      const depth = (index % 5 + 1) * 2;
      const shiftX = (x - window.innerWidth / 2) / (100 / depth);
      item.style.transform = `translateX(${shiftX}px)`;
    });

    // Magnetic and Tilt effects
    magneticElements.forEach(el => {
      const rect = el.getBoundingClientRect();
      const centerX = rect.left + rect.width / 2;
      const centerY = rect.top + rect.height / 2;
      const dx = x - centerX;
      const dy = y - centerY;
      const distance = Math.sqrt(dx * dx + dy * dy);

      if (distance < 150) {
        const strength = 15;
        const magX = (dx / distance) * strength * (1 - distance / 150);
        const magY = (dy / distance) * strength * (1 - distance / 150);

        let transform = `translate(${magX}px, ${magY}px)`;

        if (el.classList.contains('grid-card') || el.classList.contains('profile-img-container')) {
          const tiltX = (dy / 75) * 15;
          const tiltY = -(dx / 75) * 15;
          transform += ` perspective(1000px) rotateX(${tiltX}deg) rotateY(${tiltY}deg) scale(1.05)`;
        }

        el.style.transform = transform;
      } else {
        el.style.transform = '';
      }
    });
  });

  // Cursor interaction with elements
  const interactables = document.querySelectorAll('a, .profile-img-container, .grid-card, .music-player button, .music-player a');
  interactables.forEach(el => {
    el.addEventListener('mouseenter', () => {
      cursor.classList.add('hovering');
      follower.classList.add('hovering');
    });
    el.addEventListener('mouseleave', () => {
      cursor.classList.remove('hovering');
      follower.classList.remove('hovering');
    });
  });

  // Music Player Logic
  const widgetIframe = document.getElementById('sc-widget');
  const widget = SC.Widget(widgetIframe);
  const playPauseBtn = document.getElementById('play-pause-btn');
  const shuffleBtn = document.getElementById('shuffle-btn');
  const trackTitle = document.getElementById('track-title');
  const trackArtist = document.getElementById('track-artist');
  let isPlaying = false;
  let isShuffled = false;

  widget.bind(SC.Widget.Events.READY, () => {
    widget.getSounds((sounds) => {
      if (sounds && sounds.length > 0) {
        trackTitle.textContent = "Click Play to Start";
        trackArtist.textContent = "runeskate";
      }
    });
    // Attempt to play automatically (browsers may block this until user interaction)
    widget.play();
  });

  // Fallback: Start playing on first user interaction if autoplay was blocked
  const startAudioOnInteraction = () => {
    if (!isPlaying) {
      widget.play();
    }
    document.removeEventListener('click', startAudioOnInteraction);
  };
  document.addEventListener('click', startAudioOnInteraction);

  widget.bind(SC.Widget.Events.PLAY, () => {
    isPlaying = true;
    playPauseBtn.innerHTML = '<i class="fa fa-pause"></i>';
    widget.getCurrentSound((sound) => {
      if (sound) {
        trackTitle.textContent = sound.title;
        trackArtist.textContent = sound.user.username;
      }
    });
  });

  widget.bind(SC.Widget.Events.PAUSE, () => {
    isPlaying = false;
    playPauseBtn.innerHTML = '<i class="fa fa-play"></i>';
  });

  widget.bind(SC.Widget.Events.FINISH, () => {
    if (isShuffled) {
      widget.getSounds((sounds) => {
        const randomIndex = Math.floor(Math.random() * sounds.length);
        widget.skip(randomIndex);
      });
    }
  });

  playPauseBtn.addEventListener('click', () => {
    widget.toggle();
  });

  shuffleBtn.addEventListener('click', () => {
    isShuffled = !isShuffled;
    shuffleBtn.style.color = isShuffled ? '#4ade80' : 'white';
    if (isShuffled && isPlaying) {
      widget.getSounds((sounds) => {
        const randomIndex = Math.floor(Math.random() * sounds.length);
        widget.skip(randomIndex);
      });
    }
  });

</script>
</body>
</html>
